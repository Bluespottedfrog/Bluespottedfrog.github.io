<html>
  <head>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  </head>
  <body>


    <a-scene>
      <a-assets>
        <img id='lobby' src="Store Images/Lobby.jpg">
        <img id='balcony' src="Store Images/Balcony.jpg">
        <img id='groom' src="Store Images/Groom.jpg">
        <img id='sleep' src="Store Images/Sleep.jpg">
      </a-assets>

      <a-camera look-controls
        mouse-cursor cursor="rayOrigin: mouse;"
        raycaster="objects: .portal">
      </a-camera>



      <a-entity id="balcony-scene">
        <a-sky id="env" src="#balcony"></a-sky>
        <a-cylinder class="portal" position="-7 -5 19" geometry="primitive: cylinder; height: 0.1; radius: 2" onclick="toGroom()"></a-cylinder>
      </a-entity>

      <a-entity id="sleep-scene">
        <a-sky id="env" src="#sleep"></a-sky>
        <a-cylinder class="portal" position="8 -5 -15" geometry="primitive: cylinder; height: 0.1; radius: 2" onclick="toLobby()"></a-cylinder>
        <a-cylinder class="portal" position="1 -5 15" geometry="primitive: cylinder; height: 0.1; radius: 2" onclick="toGroom()"></a-cylinder>
      </a-entity>

      <a-entity id="groom-scene">
        <a-sky id="env" src="#groom"></a-sky>
        <a-cylinder class="portal" position="-3 -13 -15" geometry="primitive: cylinder; height: 0.1; radius: 2" onclick="toSleep()"></a-cylinder>
        <a-cylinder class="portal" position="-20 -13 7" geometry="primitive: cylinder; height: 0.1; radius: 2" onclick="toBalcony()"></a-cylinder>
      </a-entity>

      <a-entity id="lobby-scene">
        <a-sky id="env" src="#lobby"></a-sky>
        <a-cylinder class="portal" position="-12 -8 11" geometry="primitive: cylinder; height: 0.1; radius: 2" onclick="toSleep()"></a-cylinder>
      </a-entity>

    </a-scene>

    <script>
      var rooms = new Array();
      rooms.push(document.getElementById('lobby-scene'));
      rooms.push(document.getElementById('balcony-scene'));
      rooms.push(document.getElementById('groom-scene'));
      rooms.push(document.getElementById('sleep-scene'));

      for(var i = 1; i < rooms.length; i++){
        rooms[i].setAttribute('visible', 'false');
      }

      function toLobby(){
          for(var i = 0; i < rooms.length; i++){
            rooms[i].setAttribute('visible', 'false');
          }

          rooms[0].setAttribute('visible', 'true');
      }

      function toBalcony(){
          for(var i = 0; i < rooms.length; i++){
            rooms[i].setAttribute('visible', 'false');
          }

          rooms[1].setAttribute('visible', 'true');
      }

      function toSleep(){
          for(var i = 0; i < rooms.length; i++){
            rooms[i].setAttribute('visible', 'false');
          }

          rooms[3].setAttribute('visible', 'true');
      }

      function toGroom(){
          for(var i = 0; i < rooms.length; i++){
            rooms[i].setAttribute('visible', 'false');
          }

          rooms[2].setAttribute('visible', 'true');
      }


    </script>

  </body>
</html>
